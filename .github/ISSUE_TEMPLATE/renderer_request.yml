name: Renderer request
description: Propose a 3DGS renderer for inclusion in the benchmark.
title: "[Renderer]: "
labels: [enhancement]
body:
  - type: input
    id: repository
    attributes:
      label: Upstream repository
      placeholder: https://github.com/owner/project
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why include it?
      description: Link the paper and explain the performance or quality claim to test.
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Source availability
      options:
        - Official implementation
        - Third-party implementation
        - Paper only
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Build or compatibility notes
      description: Known CUDA, PyTorch, platform, or licensing constraints.
