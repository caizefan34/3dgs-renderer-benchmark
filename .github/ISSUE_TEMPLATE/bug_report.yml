name: Bug report
description: Report incorrect behavior or a reproducibility problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve the benchmark.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the exact command, scene, renderer, and traceback.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: GPU, OS, driver, Python, PyTorch, CUDA, and renderer versions.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or related links.
