name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Publish docs and report JSON to gh-pages
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          find /tmp/gh-pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R docs/. /tmp/gh-pages/
          if [[ -d docs/data ]]; then
            while IFS= read -r -d '' report; do
              relative_path="${report#docs/}"
              test -f "/tmp/gh-pages/${relative_path}"
            done < <(find docs/data -type f -name '*.json' -print0)
          fi
          touch /tmp/gh-pages/.nojekyll
          cd /tmp/gh-pages
          git add -A
          if git diff --cached --quiet; then
            echo "Page content is already up to date."
            exit 0
          fi
          git commit -m "Deploy Pages from ${GITHUB_SHA}"
          git push origin HEAD:gh-pages
