name: Manual GPU Benchmark

on:
  workflow_dispatch:
    inputs:
      gaussians:
        description: Number of synthetic Gaussians
        required: true
        default: "50000"
        type: choice
        options:
          - "50000"
          - "200000"
          - "400000"
      renderers:
        description: Space-separated registered renderer names
        required: true
        default: "gsplat"
        type: string
      frames:
        description: Measured frames per repeat
        required: true
        default: "100"
        type: string

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Validate prebuilt GPU environment
        run: python -c "import torch; assert torch.cuda.is_available(); print(torch.cuda.get_device_name(0), torch.__version__, torch.version.cuda)"

      - name: Generate deterministic synthetic scene
        run: python src/scripts/generate_scene.py --gaussians ${{ inputs.gaussians }} --output data/scene-ci.ply

      - name: Run benchmark
        run: python src/run_benchmark.py --scene data/scene-ci.ply --camera-path circle --renderers ${{ inputs.renderers }} --frames ${{ inputs.frames }} --warmup 30 --repeats 3 --output results/ci/manual

      - name: Archive results
        uses: actions/upload-artifact@v4
        with:
          name: gpu-benchmark-${{ inputs.gaussians }}-${{ github.run_id }}
          path: results/ci/manual/
