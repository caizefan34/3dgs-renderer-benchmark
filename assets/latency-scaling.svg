<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">3DGS renderer latency scaling</title>
  <desc id="desc">Log-scale mean GPU latency for HiGS, Speedy-Splat, and dense gsplat on 50K, 200K, and 400K synthetic heavy-overlap scenes measured on an RTX 5070 Laptop at 1920 by 1080. Lower is better.</desc>
  <rect width="1200" height="630" rx="24" fill="#0a0a1a"/>
  <text x="70" y="60" fill="#f4f4ff" font-family="Inter,Segoe UI,sans-serif" font-size="30" font-weight="700">Latency scaling on heavy-overlap synthetic scenes</text>
  <text x="70" y="92" fill="#9b9bc8" font-family="Inter,Segoe UI,sans-serif" font-size="17">RTX 5070 Laptop · 1920×1080 · synchronized mean GPU latency · log scale · lower is better</text>

  <g stroke="#292957" stroke-width="1">
    <line x1="145" y1="500" x2="1130" y2="500"/>
    <line x1="145" y1="389" x2="1130" y2="389"/>
    <line x1="145" y1="278" x2="1130" y2="278"/>
    <line x1="145" y1="167" x2="1130" y2="167"/>
    <line x1="145" y1="120" x2="1130" y2="120"/>
  </g>
  <g fill="#9b9bc8" font-family="Inter,Segoe UI,sans-serif" font-size="15" text-anchor="end">
    <text x="130" y="505">1 ms</text>
    <text x="130" y="394">10 ms</text>
    <text x="130" y="283">100 ms</text>
    <text x="130" y="172">1,000 ms</text>
    <text x="130" y="125">5,000 ms</text>
  </g>

  <g stroke="#7c5cfc" stroke-width="5" fill="#7c5cfc">
    <path d="M285 467 L630 411 L975 367" fill="none"/>
    <circle cx="285" cy="467" r="7"/><circle cx="630" cy="411" r="7"/><circle cx="975" cy="367" r="7"/>
  </g>
  <g stroke="#5cfc9c" stroke-width="5" fill="#5cfc9c">
    <path d="M285 378 L630 260 L975 142" fill="none"/>
    <rect x="278" y="371" width="14" height="14"/><rect x="623" y="253" width="14" height="14"/><rect x="968" y="135" width="14" height="14"/>
  </g>
  <g stroke="#fcb85c" stroke-width="5" fill="#fcb85c">
    <path d="M285 379 L630 214" fill="none"/>
    <path d="M285 370 l9 16 h-18 z"/><path d="M630 205 l9 16 h-18 z"/>
  </g>

  <g fill="#f4f4ff" font-family="JetBrains Mono,Consolas,monospace" font-size="15" text-anchor="middle">
    <text x="285" y="451">1.99</text><text x="630" y="395">6.34</text><text x="975" y="351">15.96</text>
    <text x="285" y="360">12.56</text><text x="630" y="286">145.75</text><text x="975" y="124">1705.36</text>
    <text x="285" y="409">12.25</text><text x="630" y="198">383.10</text>
  </g>
  <g fill="#f4f4ff" font-family="Inter,Segoe UI,sans-serif" font-size="18" text-anchor="middle">
    <text x="285" y="540">50K Gaussians</text>
    <text x="630" y="540">200K Gaussians</text>
    <text x="975" y="540">400K Gaussians</text>
  </g>

  <g font-family="Inter,Segoe UI,sans-serif" font-size="16">
    <circle cx="300" cy="585" r="6" fill="#7c5cfc"/><text x="315" y="591" fill="#f4f4ff">HiGS</text>
    <rect x="482" y="579" width="12" height="12" fill="#5cfc9c"/><text x="504" y="591" fill="#f4f4ff">Speedy-Splat</text>
    <path d="M710 576 l8 14 h-16 z" fill="#fcb85c"/><text x="730" y="591" fill="#f4f4ff">gsplat dense</text>
    <text x="1075" y="591" text-anchor="end" fill="#9b9bc8">400K dense: not recorded</text>
  </g>
</svg>
